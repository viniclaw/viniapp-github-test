name: Build and Deploy Viniapp

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      network:
        description: 'Network for smart contract deployment'
        required: false
        default: 'baseSepolia'
        type: choice
        options:
          - hardhat
          - baseSepolia
          - base
      deploy_contracts:
        description: 'Deploy smart contracts?'
        required: false
        default: false
        type: boolean
      app_name:
        description: 'App name (slug for Vercel)'
        required: false
        default: 'viniapp-test'

jobs:
  deploy-contracts:
    if: ${{ github.event.inputs.deploy_contracts == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/hardhat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install

      - name: Deploy smart contracts
        run: echo "sss" | yarn deploy --network ${{ github.event.inputs.network || 'baseSepolia' }}
        timeout-minutes: 15

      - name: Verify smart contracts
        run: yarn verify --network ${{ github.event.inputs.network || 'baseSepolia' }}
        continue-on-error: true
        timeout-minutes: 15

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-deployments
          path: packages/hardhat/deployments/
          retention-days: 7

  build-and-deploy:
    needs: [deploy-contracts]
    if: always() && (needs.deploy-contracts.result == 'success' || needs.deploy-contracts.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download contract artifacts
        if: ${{ github.event.inputs.deploy_contracts == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: contract-deployments
          path: packages/hardhat/deployments/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: yarn install

      - name: Build for production
        run: yarn vercel build --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt to Vercel
        run: |
          yarn vercel deploy --prebuilt --prod \
            --name "${{ github.event.inputs.app_name || 'viniapp-test' }}" \
            --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            > vercel-deployment-url.txt 2>&1
          echo "DEPLOY_URL=$(cat vercel-deployment-url.txt | grep -o 'https://[^ ]*' | tail -1)" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print deployment URL
        run: |
          echo "🚀 Deployed to: ${{ env.DEPLOY_URL }}"
          echo "## Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **${{ env.DEPLOY_URL }}**" >> $GITHUB_STEP_SUMMARY
